# Server Security Headers Configuration
# Apply these headers on your web server (Nginx/Apache) for full security

## NGINX Configuration
# Add to your nginx.conf or site configuration file:

server {
    # ... your server config ...
    
    # Security Headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    
    # Content Security Policy (includes frame-ancestors)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://your-api-domain.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    
    # HTTPS only (enable after SSL setup)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
}

## APACHE Configuration
# Add to your .htaccess or apache config:

<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    
    # Content Security Policy (includes frame-ancestors)
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://your-api-domain.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    
    # HTTPS only (enable after SSL setup)
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
</IfModule>

## IMPORTANT NOTES:
# 1. frame-ancestors MUST be set via HTTP headers, not meta tags
# 2. Replace 'https://your-api-domain.com' with your actual API domain
# 3. Enable HSTS (Strict-Transport-Security) only after SSL is properly configured
# 4. Test headers after deployment using: curl -I https://your-domain.com
